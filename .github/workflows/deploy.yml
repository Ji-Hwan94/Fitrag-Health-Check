name: Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  verify:
    name: Verify build
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_API_BASE_URL: ${{ vars.NEXT_PUBLIC_API_BASE_URL || 'http://127.0.0.1:4000/api/v1' }}
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/postgres
      JWT_SECRET: ci-only-secret
      GEMINI_API_KEY: ci-placeholder
      GEMINI_MODEL: gemini-2.5-flash
      GEMINI_EMBEDDING_MODEL: gemini-embedding-001
      GEMINI_EMBEDDING_DIMENSIONS: 768
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install frontend dependencies
        working-directory: fitrag_front
        run: npm ci

      - name: Build frontend
        working-directory: fitrag_front
        run: npm run build

      - name: Install backend dependencies
        working-directory: fitrag_end
        run: npm ci

      - name: Build backend
        working-directory: fitrag_end
        run: npm run build

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script_stop: true
          envs: DEPLOY_PATH
          script: |
            set -e

            cd "$DEPLOY_PATH"
            git fetch --prune origin
            git checkout main
            git pull --ff-only origin main

            cd fitrag_front
            npm ci
            npm run build

            cd ../fitrag_end
            npm ci
            npm run build

            if ! command -v pm2 >/dev/null 2>&1; then
              echo "pm2 is not installed on this server."
              exit 1
            fi

            cd ../fitrag_front
            pm2 reload fitrag-front || pm2 start npm --name fitrag-front -- run start

            cd ../fitrag_end
            pm2 reload fitrag-end || pm2 start node --name fitrag-end -- dist/main.js

            pm2 save
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
