name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - develop

permissions:
  contents: read

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fitrag_front
    env:
      NEXT_PUBLIC_API_BASE_URL: ${{ vars.NEXT_PUBLIC_API_BASE_URL || 'http://127.0.0.1:4000/api/v1' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: fitrag_front/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fitrag_end
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/postgres
      JWT_SECRET: ci-only-secret
      GEMINI_API_KEY: ci-placeholder
      GEMINI_MODEL: gemini-2.5-flash
      GEMINI_EMBEDDING_MODEL: gemini-embedding-001
      GEMINI_EMBEDDING_DIMENSIONS: 768
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: fitrag_end/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test -- --runInBand --passWithNoTests

      - name: Build
        run: npm run build
